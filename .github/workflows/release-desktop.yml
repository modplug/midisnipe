name: Release Desktop Builds

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform.name }}
    runs-on: ${{ matrix.platform.os }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: macOS Intel
            os: macos-15-intel
            script: dist:mac:x64
            artifact: "release/*"
          - name: macOS Apple Silicon
            os: macos-latest
            script: dist:mac:arm64
            artifact: "release/*"
          - name: Windows
            os: windows-latest
            script: dist:win
            artifact: "release/*"
          - name: Linux
            os: ubuntu-latest
            script: dist:linux
            artifact: "release/*"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Linux packaging dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libarchive-tools

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build web app
        run: npm run build

      - name: Build desktop package
        run: npm run ${{ matrix.platform.script }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: midisnipe-${{ matrix.platform.name }}
          path: ${{ matrix.platform.artifact }}
          if-no-files-found: error

      - name: Attach files to GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.platform.artifact }}
